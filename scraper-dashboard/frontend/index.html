<!DOCTYPE html>
<!-- Author: Ck.epsilon & Chaos (AI Programming Assistant) -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scraper Pro — Real-Time Scraping Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28' font-family='serif' font-style='italic'>ε</text></svg>">
<style>
:root{
  --bg: #ffffff;
  --bg-elevated: #f5f5f7;
  --text: #1d1d1f;
  --text-secondary: #86868b;
  --blue: #0071e3;
  --blue-hover: #0077ed;
  --link: #0066cc;
  --card-bg: #ffffff;
  --border: rgba(0,0,0,0.08);
  --green: #34c759;
  --red: #ff3b30;
  --orange: #ff9500;
  --nav-height: 44px;
  --max-width: 980px;
  --font: system-ui, -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-display: system-ui, -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
  --radius: 18px;
  --radius-sm: 11px;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg: #000000;
    --bg-elevated: #1d1d1f;
    --text: #f5f5f7;
    --text-secondary: #86868b;
    --card-bg: #1d1d1f;
    --border: rgba(255,255,255,0.12);
  }
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--font);
  color:var(--text);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  font-size:17px;line-height:1.47059;letter-spacing:-0.022em;
}
nav{
  position:sticky;top:0;z-index:100;
  height:var(--nav-height);
  background:rgba(255,255,255,0.8);
  backdrop-filter:saturate(1.8) blur(20px);
  -webkit-backdrop-filter:saturate(1.8) blur(20px);
  border-bottom:1px solid var(--border);
}
@media (prefers-color-scheme: dark){nav{background:rgba(29,29,31,0.8)}}
nav .inner{
  max-width:var(--max-width);margin:0 auto;
  height:100%;display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;
}
nav .logo{font-size:17px;font-weight:600;letter-spacing:-0.022em}
nav .status-dot{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary)}
nav .status-dot .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}

main{max-width:var(--max-width);margin:0 auto;padding:48px 22px}

.hero{text-align:center;padding:24px 0 48px}
.hero h1{font-family:var(--font-display);font-size:48px;font-weight:700;letter-spacing:-0.003em;line-height:1.08349}
.hero h1 span{color:var(--blue)}
.hero p{font-size:21px;font-weight:400;color:var(--text-secondary);margin-top:12px;letter-spacing:-0.01em}

/* Form */
.form-card{
  background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:32px;margin-bottom:32px;
}
.form-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.form-row .field{flex:1;min-width:200px}
.field label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.04em}
input,select{
  width:100%;padding:11px 16px;font-size:17px;font-family:var(--font);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg);color:var(--text);
  outline:none;transition:border-color .2s;
}
input:focus,select:focus{border-color:var(--blue)}
.btn{
  padding:11px 21px;font-size:17px;font-family:var(--font);
  border:none;border-radius:980px;cursor:pointer;
  font-weight:600;letter-spacing:-0.022em;transition:background .2s,opacity .2s;
}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-hover)}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.btn-ghost{background:var(--bg-elevated);color:var(--link)}
.btn-ghost:hover{background:var(--border)}

/* Task list */
.task-list{display:flex;flex-direction:column;gap:8px;margin-bottom:32px}
.task-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);cursor:pointer;transition:border-color .2s
}
.task-item:hover{border-color:var(--blue)}
.task-item .task-info{display:flex;align-items:center;gap:12px}
.task-item .task-url{font-size:14px;color:var(--text);max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:980px;text-transform:uppercase;letter-spacing:0.04em}
.badge-pending{background:#f5f5f7;color:var(--text-secondary)}
.badge-running{background:#e8f0fe;color:var(--blue)}
.badge-completed{background:#e8f8ee;color:var(--green)}
.badge-failed{background:#fde8e8;color:var(--red)}

/* Live section */
.live-section{display:none}
.live-section.active{display:block}
.live-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.live-header h2{font-size:21px;font-weight:600;letter-spacing:-0.01em}

/* Progress */
.progress-bar{
  height:4px;background:var(--bg-elevated);border-radius:2px;
  margin-bottom:24px;overflow:hidden;
}
.progress-bar .fill{
  height:100%;background:var(--blue);border-radius:2px;
  transition:width .3s ease;width:0%;
}

/* Log */
.log-panel{
  background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;max-height:320px;overflow-y:auto;margin-bottom:24px;
  font-family:"Cascadia Code","Fira Code","Consolas",monospace;font-size:13px;line-height:1.6;
}
.log-entry{display:flex;gap:8px;padding:2px 0}
.log-entry .time{color:var(--text-secondary);flex-shrink:0;width:80px}
.log-entry .level{flex-shrink:0;width:48px;font-weight:600;text-transform:uppercase;font-size:11px}
.log-entry.info .level{color:var(--blue)}
.log-entry.warn .level{color:var(--orange)}
.log-entry.error .level{color:var(--red)}
.log-entry.success .level{color:var(--green)}
.log-entry .msg{color:var(--text)}

/* Results table */
.results-wrap{display:none}
.results-wrap.active{display:block}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.results-header h2{font-size:21px;font-weight:600}
.results-meta{font-size:14px;color:var(--text-secondary)}
.table-wrap{overflow-x:auto;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius)}
table{width:100%;border-collapse:collapse}
thead th{
  text-align:left;padding:12px 16px;font-size:12px;font-weight:600;color:var(--text-secondary);
  text-transform:uppercase;letter-spacing:0.04em;border-bottom:1px solid var(--border);
  cursor:pointer;user-select:none;position:sticky;top:0;background:var(--card-bg);
}
thead th:hover{color:var(--text)}
tbody td{padding:10px 16px;font-size:14px;border-bottom:1px solid var(--border)}
tbody tr:last-child td{border-bottom:none}
.search-bar{
  width:100%;margin-bottom:12px;
}
</style>
</head>
<body>

<nav role="navigation" aria-label="Main navigation">
  <div class="inner">
    <div class="logo">&epsilon; Scraper Pro</div>
    <div class="status-dot" role="status" aria-live="polite"><span class="dot" id="statusDot"></span><span id="statusText">Backend checking...</span></div>
  </div>
</nav>

<main role="main">
  <div class="hero">
    <h1>Scraper <span>Pro</span></h1>
    <p>Real-time web scraping dashboard. Create tasks, watch logs stream, export results.</p>
  </div>

  <!-- Create Task -->
  <form class="form-card" aria-label="New scrape task" onsubmit="event.preventDefault();startTask()">
    <div class="form-row">
      <div class="field" style="flex:2">
        <label for="urlInput">Target URL</label>
        <input type="url" id="urlInput" placeholder="https://example.com" value="https://books.toscrape.com" required>
      </div>
      <div class="field">
        <label for="modeSelect">Mode</label>
        <select id="modeSelect">
          <option value="list">List Items</option>
          <option value="structured">Structured Fields</option>
        </select>
      </div>
    </div>
    <div class="form-row" id="listConfig">
      <div class="field">
        <label for="selectorInput">Item Selector</label>
        <input type="text" id="selectorInput" placeholder="article.product_pod" value="article.product_pod">
      </div>
      <div class="field">
        <label for="pagesInput">Max Pages</label>
        <input type="number" id="pagesInput" value="3" min="1" max="20">
      </div>
      <div class="field">
        <label for="nextSelectorInput">Next Page Selector</label>
        <input type="text" id="nextSelectorInput" placeholder=".next a" value=".next a">
      </div>
    </div>
    <div class="form-row" id="structuredConfig" style="display:none">
      <div class="field">
        <label for="fieldsInput">Fields (JSON)</label>
        <input type="text" id="fieldsInput" placeholder='[{"name":"title","selector":"h3 a"}]' value='[{"name":"title","selector":"h3 a"},{"name":"price","selector":".price_color"}]'>
      </div>
    </div>
    <button class="btn btn-primary" id="startBtn" type="submit">Start Scraping</button>
  </form>

  <!-- Live Section -->
  <section class="live-section" id="liveSection" aria-label="Live scraping progress">
    <div class="live-header">
      <h2 id="liveTitle">Live Progress</h2>
      <button class="btn btn-ghost" onclick="downloadCSV()" aria-label="Export results as CSV">Export CSV</button>
    </div>
    <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Scraping progress"><div class="fill" id="progressFill"></div></div>
    <div class="log-panel" id="logPanel" role="log" aria-live="polite" aria-label="Real-time scrape log"></div>
    <div class="results-wrap" id="resultsWrap">
      <div class="results-header">
        <h2>Results</h2>
        <span class="results-meta" id="resultsMeta"></span>
      </div>
      <label for="searchInput" class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden">Search results</label>
      <input class="search-bar" type="search" id="searchInput" placeholder="Search results..." oninput="filterTable()" aria-label="Filter results table">
      <div class="table-wrap" role="region" aria-label="Scrape results table" tabindex="0">
        <table id="resultsTable"><thead></thead><tbody></tbody></table>
      </div>
    </div>
  </section>

  <!-- Task History -->
  <h2 style="font-size:21px;font-weight:600;margin-bottom:12px">Task History</h2>
  <div class="task-list" id="taskList" role="list" aria-label="Previous scrape tasks"></div>
</main>

<script>
const API = 'http://localhost:8700';
let ws = null;
let currentTaskId = null;
let currentSort = {key:null, asc:true};

async function checkHealth(){
  try{const r=await fetch(API+'/health');const d=await r.json();
    document.getElementById('statusDot').style.background='var(--green)';
    document.getElementById('statusText').textContent='Connected';
  }catch(e){
    document.getElementById('statusDot').style.background='var(--red)';
    document.getElementById('statusText').textContent='Disconnected';
  }
}
checkHealth();setInterval(checkHealth,5000);

document.getElementById('modeSelect').onchange=function(){
  document.getElementById('listConfig').style.display=this.value==='list'?'flex':'none';
  document.getElementById('structuredConfig').style.display=this.value==='structured'?'flex':'none';
};

async function startTask(){
  const url=document.getElementById('urlInput').value;
  const mode=document.getElementById('modeSelect').value;
  const config={};
  if(mode==='list'){
    config.selector=document.getElementById('selectorInput').value;
    config.max_pages=parseInt(document.getElementById('pagesInput').value)||1;
    config.next_selector=document.getElementById('nextSelectorInput').value||'';
  }else{
    try{config.fields=JSON.parse(document.getElementById('fieldsInput').value)}
    catch(e){return alert('Invalid JSON in fields')}
    config.selector='*';
  }
  const btn=document.getElementById('startBtn');btn.disabled=true;btn.textContent='Starting...';
  try{
    const r=await fetch(API+'/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url,config})});
    const task=await r.json();
    currentTaskId=task.id;
    connectWS(task.id);
    showLive(task);
    btn.textContent='Running...';
  }catch(e){btn.disabled=false;btn.textContent='Start Scraping';alert('Failed: '+e.message)}
}

function connectWS(taskId){
  if(ws){ws.close()} 
  ws=new WebSocket(API.replace('http','ws')+'/ws/'+taskId);
  ws.onmessage=function(e){
    const msg=JSON.parse(e.data);
    if(msg.type==='ping')return;
    addLog(msg);
    if(msg.type==='progress')updateProgress(msg);
    if(msg.type==='complete'||msg.type==='error')onTaskDone(taskId);
  };
  ws.onerror=function(){addLog({type:'error',message:'WebSocket connection lost'})};
}

function showLive(task){
  const s=document.getElementById('liveSection');s.classList.add('active');
  document.getElementById('liveTitle').textContent='Scraping: '+task.url;
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('logPanel').innerHTML='';
  document.getElementById('resultsWrap').classList.remove('active');
  document.getElementById('resultsTable').querySelector('thead').innerHTML='';
  document.getElementById('resultsTable').querySelector('tbody').innerHTML='';
}

function addLog(msg){
  const panel=document.getElementById('logPanel');
  const t=new Date().toLocaleTimeString();
  const lvl=msg.level||(msg.type==='error'?'error':'info');
  const cls=msg.type==='complete'?'success':lvl;
  const div=document.createElement('div');div.className='log-entry '+cls;
  div.innerHTML=`<span class="time">${t}</span><span class="level">${msg.type||lvl}</span><span class="msg">${esc(msg.message)}</span>`;
  panel.appendChild(div);panel.scrollTop=panel.scrollHeight;
}

function updateProgress(msg){
  const pct=msg.total_pages?Math.round(msg.page/msg.total_pages*100):0;
  const bar=document.getElementById('progressFill');
  bar.style.width=pct+'%';
  document.querySelector('.progress-bar').setAttribute('aria-valuenow',pct);
}

async function onTaskDone(taskId){
  document.getElementById('startBtn').disabled=false;
  document.getElementById('startBtn').textContent='Start Scraping';
  try{
    const r=await fetch(API+'/tasks/'+taskId);
    const task=await r.json();
    if(task.results?.length){
      renderTable(task);
      document.getElementById('resultsWrap').classList.add('active');
      document.getElementById('resultsMeta').textContent=task.rows_scraped+' rows · '+task.pages_scraped+' pages';
    }
  }catch(e){console.error(e)}
  loadTaskList();
}

function renderTable(task){
  const keys=Object.keys(task.results[0]);
  const thead=document.getElementById('resultsTable').querySelector('thead');
  thead.innerHTML='<tr>'+keys.map(k=>`<th scope="col" onclick="sortTable('${k}')" aria-sort="${currentSort.key===k?(currentSort.asc?'ascending':'descending'):'none'}">${k}</th>`).join('')+'</tr>';
  const tbody=document.getElementById('resultsTable').querySelector('tbody');
  tbody.innerHTML=task.results.map(r=>'<tr>'+keys.map(k=>`<td>${esc(r[k]||'')}</td>`).join('')+'</tr>').join('');
}

function sortTable(key){
  if(currentSort.key===key)currentSort.asc=!currentSort.asc;
  else{currentSort.key=key;currentSort.asc=true}
}

function filterTable(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const rows=document.querySelectorAll('#resultsTable tbody tr');
  rows.forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(q)?'':'none'});
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function downloadCSV(){
  if(!currentTaskId)return;
  window.open(API+'/tasks/'+currentTaskId+'/export','_blank');
}

async function loadTaskList(){
  try{
    const r=await fetch(API+'/tasks');const tasks=await r.json();
    const el=document.getElementById('taskList');
    el.innerHTML=tasks.map(t=>`
      <div class="task-item" role="listitem" onclick="loadTask('${t.id}')" tabindex="0" onkeydown="if(event.key==='Enter')loadTask('${t.id}')">
        <div class="task-info">
          <span class="badge badge-${t.status||'pending'}">${t.status||'pending'}</span>
          <span class="task-url">${esc(t.url)}</span>
        </div>
        <span style="font-size:12px;color:var(--text-secondary)">${t.rows_scraped||0} rows</span>
      </div>`).join('');
  }catch(e){}
}
loadTaskList();

function loadTask(id){/* Placeholder for task detail view */}
</script>
</body>
</html>
