# Author: Ck.epsilon

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8700:8700"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
