# Author: Ck.epsilon
# Pre-commit hooks: run `pre-commit install` after `pip install pre-commit`
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff        # Linter
        args: [--fix]
      - id: ruff-format # Formatter (replaces black)

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports]
        additional_dependencies:
          - pydantic>=2.0
          - sqlalchemy>=2.0
          - fastapi>=0.100
