# Author: Ck.epsilon
# Development + Production compose file
#
# Dev:   docker compose watch            (hot reload, code mounts)
#        docker compose up api-dev       (manual)
# Prod:  docker compose up -d            (build + postgres + api)

services:
  # ---- Development: hot reload via volume mount ----
  api-dev:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app:ro
    env_file:
      - .env
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    profiles:
      - dev

  # ---- Production ----
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
