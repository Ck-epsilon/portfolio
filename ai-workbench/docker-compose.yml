# ──────────────────────────────────────────────────────────────
# AI Workbench — Docker Compose
# ──────────────────────────────────────────────────────────────
# CrewAI multi-agent research platform with LangFuse observability.
#
# Start:  docker compose up -d
# Env:    Copy .env.example and set your API keys
# ──────────────────────────────────────────────────────────────

version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    container_name: ai-workbench-backend
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
    volumes:
      - ai_results:/app/results
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: nginx:1.27-alpine
    container_name: ai-workbench-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ai_results:
