# Author: Ck.epsilon & Chaos (AI Programming Assistant)
# Kubernetes deployment for AI Agent Workbench (Premium tier)
#
# Deploy:  kubectl apply -f k8s/
# Scale:   kubectl scale deployment workbench --replicas=3

apiVersion: apps/v1
kind: Deployment
metadata:
  name: workbench
  labels:
    app: workbench
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workbench
  template:
    metadata:
      labels:
        app: workbench
    spec:
      containers:
      - name: workbench
        image: ckepsilon/ai-workbench:latest
        ports:
        - containerPort: 8000
        env:
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: workbench-secrets
              key: smtp_host
              optional: true
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: workbench-secrets
              key: smtp_user
              optional: true
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: workbench-secrets
              key: smtp_password
              optional: true
        - name: SLACK_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: workbench-secrets
              key: slack_webhook
              optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: workbench
spec:
  selector:
    app: workbench
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
---
# HPA for auto-scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: workbench-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workbench
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
