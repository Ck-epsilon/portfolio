<!DOCTYPE html>
<!-- Author: Ck.epsilon & Chaos (AI Programming Assistant) -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workbench — Multi-Agent Research</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28' font-family='serif' font-style='italic'>ε</text></svg>">
<style>
:root{
  --bg:#ffffff;--bg-elevated:#f5f5f7;--bg-inset:#e8e8ed;
  --text:#1d1d1f;--text-secondary:#6e6e73;--text-tertiary:#aeaeb2;
  --blue:#0071e3;--green:#30d158;--red:#ff453a;--orange:#ff9f0a;
  --border:rgba(0,0,0,0.08);--radius:12px;--radius-sm:8px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
  --font-mono:"SF Mono","Fira Code","Consolas",monospace;--nav-h:52px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#000;--bg-elevated:#1c1c1e;--bg-inset:#2c2c2e;--text:#f5f5f7;
    --text-secondary:#98989d;--text-tertiary:#636366;--border:rgba(255,255,255,0.10);}
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.47}

nav{position:sticky;top:0;z-index:100;height:var(--nav-h);background:rgba(255,255,255,0.72);
  -webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:8px}
@media(prefers-color-scheme:dark){nav{background:rgba(0,0,0,0.72)}}
nav .logo{font-weight:600;font-size:16px}nav .badge{font-size:11px;font-weight:500;color:var(--text-secondary);
  background:var(--bg-elevated);padding:2px 8px;border-radius:99px;border:1px solid var(--border)}
nav .spacer{flex:1}

main{max-width:800px;margin:0 auto;padding:32px 24px 80px}

.search-box{display:flex;gap:8px;margin-bottom:32px}
.search-box input{flex:1;font-size:16px;padding:12px 16px;border:1px solid var(--border);
  border-radius:var(--radius);background:var(--bg-elevated);color:var(--text);
  font-family:var(--font);outline:none}
.search-box input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,113,227,0.15)}
.search-box button{padding:12px 24px;background:var(--blue);color:#fff;border:none;
  border-radius:var(--radius);font-size:16px;font-weight:500;cursor:pointer;font-family:var(--font)}
.search-box button:hover{opacity:0.9}.search-box button:disabled{opacity:0.5;cursor:default}

.result-card{background:var(--bg-elevated);border-radius:var(--radius);padding:24px;
  border:1px solid var(--border);margin-bottom:16px}
.result-card h3{font-size:17px;font-weight:600;margin-bottom:12px}
.result-card .status{font-size:13px;font-weight:500;padding:2px 10px;border-radius:99px;display:inline-block}
.status.running{background:rgba(0,113,227,0.1);color:var(--blue)}
.status.completed{background:rgba(48,209,88,0.1);color:var(--green)}
.status.failed{background:rgba(255,69,58,0.1);color:var(--red)}

.log-view{background:var(--bg-inset);border-radius:var(--radius-sm);padding:16px;
  font-family:var(--font-mono);font-size:12px;line-height:1.6;max-height:240px;overflow-y:auto;margin-top:12px}
.log-line{margin-bottom:2px;white-space:pre-wrap;word-break:break-all}
.log-line.info{color:var(--text-secondary)}.log-line.error{color:var(--red)}.log-line.warn{color:var(--orange)}
.result-text{margin-top:12px;font-size:14px;line-height:1.6;white-space:pre-wrap}

.empty-state{text-align:center;padding:48px 24px;color:var(--text-tertiary)}
.run-list{margin-top:32px}
.run-list h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-secondary);margin-bottom:16px}
</style>
</head>
<body>
<nav><span class="logo">AI Workbench</span><span class="badge">CrewAI + LangFuse</span><span class="spacer"></span></nav>

<main>
  <div class="search-box">
    <input id="topicInput" placeholder="What do you want to research? e.g. 'Current state of quantum computing in 2026'" />
    <button id="researchBtn" onclick="startResearch()">Research</button>
  </div>

  <div id="activeRun"></div>

  <div class="run-list">
    <h2>Recent Research</h2>
    <div id="runHistory"></div>
    <div class="empty-state" id="noRuns"><p>No research runs yet. Enter a topic above.</p></div>
  </div>
</main>

<script>
const API='/api';let activeWs=null;

async function startResearch(){
  const topic=document.getElementById('topicInput').value.trim();
  if(!topic)return;
  const btn=document.getElementById('researchBtn');
  btn.disabled=true;btn.textContent='Starting...';

  try{
    const r=await fetch(API+'/research',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic})});
    const data=await r.json();
    showActiveRun(data.id,topic);
    connectWS(data.id);
  }catch(e){alert('Failed: '+e.message)}
  finally{btn.disabled=false;btn.textContent='Research'}
}

function showActiveRun(id,topic){
  document.getElementById('activeRun').innerHTML=`
    <div class="result-card">
      <h3>${esc(topic)}</h3>
      <span class="status running" id="status-${id}">running</span>
      <div class="log-view" id="logs-${id}"></div>
      <div class="result-text" id="result-${id}"></div>
    </div>`
}

function connectWS(id){
  if(activeWs){activeWs.close();activeWs=null}
  const proto=location.protocol==='https:'?'wss:':'ws:';
  activeWs=new WebSocket(proto+'//'+location.host+'/ws/research/'+id);
  const logsEl=document.getElementById('logs-'+id);
  const statusEl=document.getElementById('status-'+id);
  const resultEl=document.getElementById('result-'+id);

  activeWs.onmessage=(e)=>{
    try{
      const evt=JSON.parse(e.data);
      if(evt.type==='log'){
        const div=document.createElement('div');
        div.className='log-line '+(evt.level||'info');
        div.textContent=evt.message||'';
        logsEl.appendChild(div);logsEl.scrollTop=logsEl.scrollHeight
      }else if(evt.type==='complete'){
        statusEl.textContent=evt.status;statusEl.className='status '+evt.status;
        if(evt.result)resultEl.textContent=evt.result;
        loadHistory();activeWs=null
      }
    }catch{}
  };
  activeWs.onerror=()=>{activeWs=null}
}

async function loadHistory(){
  try{
    const r=await fetch(API+'/research');
    const data=await r.json();
    const el=document.getElementById('runHistory');
    const noEl=document.getElementById('noRuns');
    if(!data.runs||data.runs.length===0){noEl.style.display='block';el.innerHTML='';return}
    noEl.style.display='none';
    el.innerHTML=data.runs.map(run=>`
      <div class="result-card" onclick="viewRun('${run.id}')" style="cursor:pointer">
        <h3>${esc(run.topic)}</h3>
        <span class="status ${run.status}">${run.status}</span>
        ${run.result?`<div class="result-text">${esc(run.result.substring(0,300))}${run.result.length>300?'...':''}</div>`:''}
      </div>`).join('')
  }catch(e){}
}

function viewRun(id){document.getElementById('topicInput').value='';showActiveRun(id,'Loading...');connectWS(id)}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

loadHistory()
</script>
</body>
</html>
